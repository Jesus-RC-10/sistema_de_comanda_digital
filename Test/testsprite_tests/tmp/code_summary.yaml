version: "2"
type: frontend
tech_stack:
  - PHP
  - MySQL
  - JavaScript
  - CSS3
  - HTML5
  - Bootstrap5
routes:
  - path: /
    file: index.php
    auth_required: false
    description: Seleccion de mesas para clientes
  - path: /login
    file: views/auth/login.php
    auth_required: false
    description: Formulario de login para empleados
  - path: /admin
    file: controllers/AdminController.php
    auth_required: true
    description: Dashboard de administracion
  - path: /admin/usuarios
    file: views/admin/usuarios.php
    auth_required: true
    description: Gestion de usuarios
  - path: /admin/mesas
    file: views/admin/mesas.php
    auth_required: true
    description: Gestion de mesas
  - path: /admin/menu
    file: views/admin/menu.php
    auth_required: true
    description: Gestion de productos
  - path: /admin/inventario
    file: views/admin/inventario.php
    auth_required: true
    description: Gestion de ingredientes
  - path: /admin/reportes
    file: views/reporte/index.php
    auth_required: true
    description: Reportes de ventas
  - path: /mesero
    file: controllers/MeseroController.php
    auth_required: true
    description: Panel de mesero con pedidos activos
  - path: /cocina
    file: controllers/CocinaController.php
    auth_required: true
    description: Pantalla de cocina
  - path: /caja
    file: controllers/CajaController.php
    auth_required: true
    description: Panel de caja
  - path: /mesa
    file: views/mesas/index.php
    auth_required: false
    description: Seleccion de mesa para clientes
  - path: /menu
    file: views/menu/index.php
    auth_required: false
    description: Menu con carrito de compras
  - path: /logout
    file: controllers/AuthController.php
    auth_required: false
    description: Cerrar sesion
features:
  - name: Autenticacion Multi-Rol
    description: Login para 4 roles con contrasena 123456
    files:
      - controllers/AuthController.php
      - models/User.php
      - views/auth/login.php
    entry_route: /login
    user_interactions:
      - Fill username input field
      - Fill password input field
      - Click Login button
      - See error message on invalid credentials
      - Redirect to role-specific dashboard
    api_calls:
      - method: POST
        endpoint: /login
    auth_required: false
  - name: Cliente Seleccion Mesa y Menu
    description: Cliente selecciona mesa y navega al menu con carrito
    files:
      - views/mesas/index.php
      - views/menu/index.php
      - controllers/MesaController.php
      - controllers/MenuController.php
      - assets/js/carrito.js
    entry_route: /mesa
    user_interactions:
      - View available tables
      - Click on a table to select it
      - View menu with products grouped by categories
      - Click Agregar button on a product card
      - See cart badge counter increment
      - Click confirmar to place order
    api_calls:
      - method: POST
        endpoint: /menu/confirmar
    auth_required: false
  - name: Dashboard de Administracion
    description: Panel de admin con metricas del sistema
    files:
      - controllers/AdminController.php
      - views/admin/dashboard.php
      - views/admin/layout.php
    entry_route: /admin
    user_interactions:
      - View system metrics
      - Navigate sidebar to all modules
      - View connected database status
    api_calls:
      - method: GET
        endpoint: /admin
    auth_required: true
  - name: Panel de Mesero
    description: Mesero ve pedidos activos y puede cerrarlos
    files:
      - controllers/MeseroController.php
      - views/mesero/index.php
    entry_route: /mesero
    user_interactions:
      - View list of active orders
      - See each order detail
      - Click Cerrar Pedido button
    api_calls:
      - method: GET
        endpoint: /mesero
    auth_required: true
  - name: Pantalla de Cocina
    description: Cocinero ve pedidos pendientes con actualizacion automatica
    files:
      - controllers/CocinaController.php
      - views/cocina/index.php
      - assets/js/cocina.js
    entry_route: /cocina
    user_interactions:
      - View pending orders filtered by categories
      - See order details
      - Change item status via combobox
      - Auto-refresh every 30 seconds
    api_calls:
      - method: GET
        endpoint: /cocina/actualizarDetalle
    auth_required: true
  - name: Panel de Caja
    description: Cajero procesa pagos de ventas pendientes
    files:
      - controllers/CajaController.php
      - views/caja/index.php
    entry_route: /caja
    user_interactions:
      - View list of pending sales
      - Enter payment amount
      - Select payment method
      - Click Pagar button
      - See change calculated
      - Paid sale disappears from pending list
    api_calls:
      - method: POST
        endpoint: /caja/pagar
    auth_required: true
  - name: Gestion de Inventario
    description: Admin gestiona ingredientes con alertas de stock bajo
    files:
      - models/Inventario.php
      - models/observers/NotificationManager.php
      - models/observers/StockObserver.php
      - views/admin/inventario.php
    entry_route: /admin/inventario
    user_interactions:
      - View all ingredients
      - Filter by stock under minimum
      - Add new ingredients
      - Update ingredient quantities
    api_calls:
      - method: GET
        endpoint: /admin/inventario
      - method: POST
        endpoint: /inventario/actualizarCantidad
    auth_required: true
  - name: Reportes
    description: Generacion de reportes de ventas
    files:
      - controllers/ReportController.php
      - views/reporte/index.php
      - generar_pdf.php
    entry_route: /admin/reportes
    user_interactions:
      - View sales reports
      - Filter by date range
      - Generate PDF reports
    api_calls:
      - method: GET
        endpoint: /admin/reportes
    auth_required: true
known_limitations:
  - issue: Carrito de cliente no funcional
    location: assets/js/carrito.js
    impact: Boton Agregar no incrementa cartBadge
  - issue: Polling de cocina roto por URL incorrecta
    location: assets/js/cocina.js
    impact: fetch usa URL hardcodeada incorrecta
  - issue: Ruta raiz muestra mesas en lugar de login
    location: index.php
    impact: Empleados deben conocer URL login
  - issue: Texto JavaScript visible en footer de caja
    location: views/caja/index.php
    impact: Aparece codigo JS en la interfaz
  - issue: Pedido duplicado en ventas pagadas
    location: controllers/CajaController.php
    impact: Query muestra registros duplicados
  - issue: Bypass de contrasena en login
    location: models/User.php
    impact: Vulnerabilidad de seguridad
  - issue: Logger no integrado en varios controladores
    location: controllers/
    impact: Perdida de trazabilidad
  - issue: usuario_id hardcodeado en CajaController
    location: controllers/CajaController.php
    impact: Ventas siempre con usuario_id igual 1