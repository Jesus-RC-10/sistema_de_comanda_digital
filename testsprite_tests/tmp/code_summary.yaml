version: "2"
type: frontend
tech_stack:
  - PHP
  - JavaScript
  - CSS
  - MySQL
  - bcrypt
routes:
  - path: /
    file: index.php
    auth_required: false
    description: Redirects to login or default route (mesa)
  - path: /login
    file: views/auth/login.php
    auth_required: false
    description: User login page with form (username, password)
  - path: /mesa
    file: views/mesas/mesas.php
    auth_required: false
    description: Customer table selection and menu browsing
  - path: /menu
    file: views/menu/menu.php
    auth_required: false
    description: Food menu display with add-to-cart functionality
  - path: /mesero
    file: views/mesero/mesero.php
    auth_required: true
    description: Waiter dashboard - view and manage active orders
  - path: /cocina
    file: views/cocina/cocina.php
    auth_required: true
    description: Kitchen display - view pending and in-progress orders
  - path: /caja
    file: views/caja/caja.php
    auth_required: true
    description: Cashier terminal - process payments and close orders
  - path: /admin
    file: views/admin/dashboard.php
    auth_required: true
    description: Admin dashboard - manage users, menu, tables, reports
features:
  - name: User Login
    description: Login with username and password, role-based redirection
    files:
      - views/auth/login.php
      - controllers/AuthController.php
      - models/User.php
    entry_route: /login
    user_interactions:
      - Fill username input field
      - Fill password input field
      - Click Login button to submit
      - See error message on invalid credentials
      - Redirected to role-specific dashboard on success
    api_calls:
      - method: POST
        endpoint: /?action=login
    auth_required: false
  - name: Customer Table Selection
    description: Customers select a table number to start browsing the menu
    files:
      - views/mesas/mesas.php
      - controllers/MesaController.php
    entry_route: /mesa
    user_interactions:
      - Click on an available table to select it
      - Redirect to menu with mesa=X parameter
    api_calls: []
    auth_required: false
  - name: Customer Menu Browsing & Ordering
    description: Browse food menu by categories, add items to cart, confirm order
    files:
      - views/menu/menu.php
      - assets/js/main.js
      - assets/js/carrito.js
      - controllers/MenuController.php
    entry_route: /menu
    user_interactions:
      - View menu items grouped by categories
      - Click "Agregar al carrito" to add items
      - View cart with items and total
      - Adjust quantities in cart
      - Click "Confirmar Pedido" to place order
      - Receive order confirmation
    api_calls:
      - method: POST
        endpoint: /menu/confirmar
    auth_required: false
  - name: Waiter Order Management
    description: Mesero views active orders, updates item status (Pendiente → Preparando → Listo → Entregado), closes completed orders
    files:
      - views/mesero/mesero.php
      - controllers/MeseroController.php
      - assets/js/mesero.js
    entry_route: /mesero
    user_interactions:
      - View all active orders with item details
      - Select status for each order item via dropdown
      - Click "Cerrar Pedido" to complete an order
      - Receive notifications when tables request assistance
      - Auto-refresh every 5 seconds
    api_calls:
      - method: GET
        endpoint: /mesero/obtenerPedidosActualizados
      - method: POST
        endpoint: /mesero/actualizarDetalle
      - method: POST
        endpoint: /mesero/cerrarPedido
    auth_required: true
  - name: Kitchen Order Display
    description: Cocina views pending orders, marks items as preparing and ready
    files:
      - views/cocina/cocina.php
      - controllers/CocinaController.php
      - assets/js/cocina.js
    entry_route: /cocina
    user_interactions:
      - View pending orders in cards layout
      - Click to mark items as "En preparación"
      - Click to mark items as "Listo"
      - Auto-refresh for new orders
    api_calls:
      - method: GET
        endpoint: /cocina/obtenerPedidosPendientes
      - method: POST
        endpoint: /cocina/actualizarEstado
    auth_required: true
  - name: Cashier Payment Processing
    description: Caja views pending payments, processes cash payments, generates tickets
    files:
      - views/caja/caja.php
      - controllers/CajaController.php
    entry_route: /caja
    user_interactions:
      - View pending orders with totals
      - Enter cash amount received
      - Click to process payment and close order
      - View payment history and daily totals
    api_calls:
      - method: POST
        endpoint: /caja/procesarPago
      - method: GET
        endpoint: /caja/obtenerPendientes
    auth_required: true
  - name: Admin Dashboard & User Management
    description: Admin manages users (create, edit, deactivate), manages menu items, tables, views reports
    files:
      - views/admin/dashboard.php
      - views/admin/usuarios.php
      - views/admin/menu.php
      - views/admin/mesas.php
      - views/admin/reportes.php
      - views/admin/inventario.php
      - controllers/AdminController.php
      - public/css/js/admin.js
    entry_route: /admin
    user_interactions:
      - View system overview dashboard
      - Create/edit/delete users with role assignment
      - Add/edit/delete menu items with categories and prices
      - Manage tables (add, edit status, delete)
      - View sales reports with filters
      - Manage inventory items
    api_calls:
      - method: POST
        endpoint: /admin/guardarUsuario
      - method: GET
        endpoint: /admin/obtenerUsuarios
      - method: POST
        endpoint: /admin/guardarProducto
      - method: POST
        endpoint: /admin/guardarMesa
      - method: GET
        endpoint: /admin/obtenerReportes
    auth_required: true
  - name: Table Assistance Request
    description: Customers can request waiter assistance from their table
    files:
      - assets/js/help-buttons.js
      - assets/js/mesero-ayuda.js
      - assets/js/NotificationManager.js
    entry_route: /mesa
    user_interactions:
      - Click assistance button on table page
      - Select type of assistance needed
      - Waiter receives popup notification
      - Waiter acknowledges and attends table
    api_calls: []
    auth_required: false
known_limitations:
  - issue: Cart data stored only in localStorage, lost on browser clear
    location: assets/js/carrito.js
    impact: Customer orders are lost if localStorage is cleared before confirmation
  - issue: No real-time websockets, uses polling every 5 seconds
    location: assets/js/mesero.js, assets/js/cocina.js
    impact: Up to 5 second delay in order updates for kitchen and waiters
  - issue: Login page uses legacy action-based routing (?action=login)
    location: index.php, views/auth/login.php
    impact: Inconsistent routing with the rest of the app which uses ?url= based routing