services:
  web:
    build: .
    ports:
      - "8081:80"
    volumes:
      - .:/var/www/html/
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASS=root
      - DB_NAME=sistema_comanda_digital_v1
      - APP_ENV=development
      - APP_DEBUG=true
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/index.php"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  test:
    build: .
    profiles:
      - test
    volumes:
      - .:/var/www/html/
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASS=root
      - DB_NAME=sistema_comanda_digital_v1
      - APP_ENV=testing
    depends_on:
      db:
        condition: service_healthy
    command: ["php", "-r", "require '/var/www/html/vendor/autoload.php'; echo 'PHPUnit ready';"]

  db:
    image: mysql:8.0
    restart: always
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=sistema_comanda_digital_v1
    volumes:
      - db_data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  phpmyadmin:
    image: phpmyadmin:latest
    profiles:
      - tools
    ports:
      - "8082:80"
    environment:
      - PMA_HOST=db
      - PMA_USER=root
      - PMA_PASSWORD=root
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
